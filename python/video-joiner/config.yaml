dry_run: true

output_dir: /mnt/sdc1/temp/joined_cycle_videos/output

grouping:
  max_gap_seconds: 1200

processing:
  rotate: 180

normalize_inputs:
  resolution: match_first
  fps: match_first

unprocessed_detection:
  enabled: false
  metric: both
  threshold_percent: 5
  apply_to: ungrouped_only

import_event:
  max_gap_seconds: 30

on_parse_failure: warn

on_sync_failure:
  mode: fallback_per_camera

sync:
  mode: offset
  sync_points:
    - reference_camera: Front
      reference_time: 2026-05-16T10:00:00
      target_camera: Rear
      target_time: 2026-05-16T09:00:05

sources:
  - name: Front
    path: /videos/front
    extensions: [MP4]
    datetime_format: YYYY_MMDD_HHMMSS_nnn
    offset_seconds: 0.0
    drift_seconds_per_hour: 0.0

  - name: Rear
    path: /videos/rear
    offset_seconds: -1.25
    drift_seconds_per_hour: 0.005

output_mode:
  type: concatenate
  concatenate:
    ordering: chronological
    camera_order: [Front, Rear]


ingest:
  mode: move | in_place

  volumes:
    - label: FRONT_CAM
      source_path: /media/FRONT/DCIM
      dest_path: /videos/front
      file_pattern: "*.MP4"

    - label: REAR_CAM
      source_path: /media/REAR/DCIM
      dest_path: /videos/rear
      file_pattern: "*.MP4"

  move:
    overwrite: false
    remove_source: false
